<section class="login-page">

  <div class="login-card">

    <div class="login-brand">
      <div class="brand-icon"></div>

      <div>
        <h1>Control de Producción</h1>
        <p>Sistema de gestión para panadería</p>
      </div>
    </div>

    <div class="login-content">
      <h2>Inicio de sesión</h2>
      <p class="login-subtitle">
        Ingresa tus credenciales para acceder al sistema.
      </p>

      <form class="login-form" (ngSubmit)="iniciarSesion()">

        <label for="usuario">Usuario</label>
        <input
          id="usuario"
          name="usuario"
          type="text"
          placeholder="Ej: usuario_encargado"
          [(ngModel)]="usuario"
        >

        <label for="password">Contraseña</label>
        <input
          id="password"
          name="password"
          type="password"
          placeholder="Ingresa tu contraseña"
          [(ngModel)]="password"
        >

        <p *ngIf="mensajeError" class="login-error">
          {{ mensajeError }}
        </p>

        <button type="submit" class="login-button" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'Ingresar al sistema' }}
        </button>

    </form>

     <p class="login-note">
        Acceso conectado al backend mediante autenticación JWT.
      </p>
    </div>

  </div>

</section>
